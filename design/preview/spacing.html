<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: flex; align-items: flex-end; gap: 14px; padding: 16px 0 8px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--iris); border-radius: 2px; width: 14px; }
  .step .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .step .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); }
</style>
</head>
<body>
<div class="card">
  <div class="card-eyebrow">Spacing · 4px base · 1·2·3·4·5·6·7·8</div>
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px"></div><span class="name">1</span><span class="val">4</span></div>
    <div class="step"><div class="bar" style="height:8px"></div><span class="name">2</span><span class="val">8</span></div>
    <div class="step"><div class="bar" style="height:12px"></div><span class="name">3</span><span class="val">12</span></div>
    <div class="step"><div class="bar" style="height:16px"></div><span class="name">4</span><span class="val">16</span></div>
    <div class="step"><div class="bar" style="height:24px"></div><span class="name">5</span><span class="val">24</span></div>
    <div class="step"><div class="bar" style="height:32px"></div><span class="name">6</span><span class="val">32</span></div>
    <div class="step"><div class="bar" style="height:48px"></div><span class="name">7</span><span class="val">48</span></div>
    <div class="step"><div class="bar" style="height:64px"></div><span class="name">8</span><span class="val">64</span></div>
  </div>
</div>
</body>
</html>
