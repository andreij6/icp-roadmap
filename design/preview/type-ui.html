<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — UI scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); width: 130px; flex-shrink: 0; }
  .demo { color: var(--fg); }
  .h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; color: var(--fg-strong); }
  .h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.015em; color: var(--fg-strong); }
  .h3 { font-size: 16px; font-weight: 600; color: var(--fg-strong); }
  .body { font-size: 14px; }
  .small { font-size: 13px; }
  .label-caps { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="card-eyebrow">UI Scale</div>
  <div>
    <div class="row"><span class="lbl">2xl · 24/28</span><span class="h1">North Star</span></div>
    <div class="row"><span class="lbl">xl · 20/26</span><span class="h2">Voting · 12 ideas</span></div>
    <div class="row"><span class="lbl">lg · 16/22</span><span class="h3">Add gasless voting</span></div>
    <div class="row"><span class="lbl">md · 14/21</span><span class="body">Boost a proposal to weight your vote up to 10×.</span></div>
    <div class="row"><span class="lbl">sm · 13/20</span><span class="small muted">Voting closes in 4 days · 12 board members</span></div>
    <div class="row"><span class="lbl">xs · 11/16 caps</span><span class="label-caps">Quorum reached</span></div>
  </div>
</div>
</body>
</html>
