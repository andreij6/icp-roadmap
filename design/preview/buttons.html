<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 4px 0; }
  .group-label { font-size: 11px; color: var(--fg-subtle); width: 64px; flex-shrink: 0; font-family: var(--font-mono); }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 30px; padding: 0 12px;
    border-radius: 6px;
    font-family: var(--font-sans);
    font-size: 13px; font-weight: 500;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 150ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .btn-primary { background: #7B7FFF; color: #fff; border-color: #7B7FFF; }
  .btn-secondary { background: #1A1D23; color: #E6E8EC; border-color: #2A2F38; }
  .btn-ghost { background: transparent; color: #E6E8EC; }
  .btn-ghost:hover { background: #1A1D23; }
  .btn-stake { background: rgba(242,201,76,0.10); color: #F2C94C; border-color: rgba(242,201,76,0.30); }
  .btn-danger { background: transparent; color: #F26D9C; border-color: rgba(242,109,156,0.30); }
  .btn-sm { height: 24px; padding: 0 8px; font-size: 12px; border-radius: 4px; }
  .ico { width: 13px; height: 13px; stroke: currentColor; stroke-width: 1.75; fill: none; }
</style>
</head>
<body>
<div class="card">
  <div class="card-eyebrow">Buttons</div>
  <div class="row">
    <span class="group-label">Default</span>
    <button class="btn btn-primary"><svg class="ico" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>New idea</button>
    <button class="btn btn-secondary">Cancel</button>
    <button class="btn btn-ghost">Filter</button>
    <button class="btn btn-stake"><svg class="ico" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>Boost · 0.5 ICP</button>
    <button class="btn btn-danger">Archive</button>
  </div>
  <div class="row">
    <span class="group-label">Small</span>
    <button class="btn btn-primary btn-sm">Vote for</button>
    <button class="btn btn-secondary btn-sm">Vote against</button>
    <button class="btn btn-ghost btn-sm">Skip</button>
    <button class="btn btn-stake btn-sm">+0.1 ICP</button>
  </div>
</div>
</body>
</html>
