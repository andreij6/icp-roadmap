<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 12px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 8px 4px; background: var(--surface-1); border: 1px solid var(--border); border-radius: 6px; }
  .ic svg { width: 18px; height: 18px; stroke: #E6E8EC; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .ic .name { font-family: var(--font-mono); font-size: 9px; color: var(--fg-subtle); }
  .meta { font-size: 11px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="card-eyebrow">Iconography · Lucide · 1.5px stroke</div>
  <div class="grid">
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg><span class="name">vote</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/></svg><span class="name">git-branch</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><path d="M6 9v12"/></svg><span class="name">git-pr</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg><span class="name">check</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="4"/><path d="M5 7v13h14V7"/><path d="M10 12h4"/></svg><span class="name">archive</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg><span class="name">zap</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="6"/><circle cx="16" cy="16" r="6"/></svg><span class="name">coins</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="8" cy="15" r="4"/><path d="m10.85 12.15 8.65-8.65"/><path d="m18 5 3 3"/><path d="m15 8 3 3"/></svg><span class="name">key</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 2 14.2 9.8 22 12 14.2 14.2 12 22 9.8 14.2 2 12 9.8 9.8 Z"/></svg><span class="name">north-star</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg><span class="name">arrow-up</span></div>
  </div>
  <span class="meta">Loaded from Lucide CDN. Custom <code>north-star</code> for the spec's "North Star" mission display.</span>
</div>
</body>
</html>
